http:
  middlewares:
    # ── Basic Auth: Monitoring Services (WUD, Portainer, Uptime Kuma, Dozzle) ────────
    monitoring-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: AI Services (Whisper, LocalAI, Ollama) ───────────────────
    ai-services-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: Internal Tools (IT-Tools, Excalidraw, Glance ext, Guacamole)
    it-tools-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: SearXNG ──────────────────────────────────────────────────
    searxng-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Docmost fix: buffer requests to force Content-Length instead of chunked ──
    # Root cause: Traefik streams requests to Docmost using Transfer-Encoding:
    # chunked (HTTP/1.1) because cloudflared doesn't set Content-Length for
    # body-less POSTs (e.g. POST /api/users/me). Fastify sees TE=chunked,
    # expects a body, finds no Content-Type, and returns 415.
    # The buffering middleware makes Traefik read the full body first, then send
    # with Content-Length set. Empty bodies → Content-Length: 0 → Fastify skips
    # Content-Type check → guards run normally (401 unauthenticated, 200 authed).
    # Applied globally to all Docmost routes.
    docmost-buffer:
      buffering:
        maxRequestBodyBytes: 104857600
        memRequestBodyBytes: 10485760

    # ── Redirect: Guacamole requires /guacamole/ path ────────────────────────
    guacamole-redirect:
      redirectRegex:
        regex: "^(https?://[^/]+)/?$"
        replacement: "${1}/guacamole/"
        permanent: false

