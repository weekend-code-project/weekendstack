http:
  middlewares:
    # ── Basic Auth: Monitoring Services (WUD, Portainer, Uptime Kuma, Dozzle) ────────
    monitoring-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: AI Services (Whisper, LocalAI, Ollama) ───────────────────
    ai-services-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: Internal Tools (IT-Tools, Excalidraw, Glance ext, Guacamole)
    it-tools-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: SearXNG ──────────────────────────────────────────────────
    searxng-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Collab-token fix: force Content-Type so NestJS body-parser accepts the
    # POST. Applied only to /api/auth/collab-token via a path-specific router.
    # (Traefik or Cloudflare strips Content-Type on this path for auth'd users.)
    docmost-collab-json:
      headers:
        customRequestHeaders:
          Content-Type: "application/json"

    # ── Redirect: Guacamole requires /guacamole/ path ────────────────────────
    guacamole-redirect:
      redirectRegex:
        regex: "^(https?://[^/]+)/?$"
        replacement: "${1}/guacamole/"
        permanent: false

