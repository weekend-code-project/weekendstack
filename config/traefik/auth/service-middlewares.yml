http:
  middlewares:
    # ── Basic Auth: Monitoring Services (WUD, Portainer, Uptime Kuma, Dozzle) ────────
    monitoring-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: AI Services (Whisper, LocalAI, Ollama) ───────────────────
    ai-services-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: Internal Tools (IT-Tools, Excalidraw, Glance ext, Guacamole)
    it-tools-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: SearXNG ──────────────────────────────────────────────────
    searxng-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Proxy Headers: Docmost (tells NestJS the original protocol was HTTPS)
    # Required for correct cookie domain, CORS, and collaboration token URLs.
    docmost-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"

    # ── Redirect: Guacamole requires /guacamole/ path ────────────────────────
    guacamole-redirect:
      redirectRegex:
        regex: "^(https?://[^/]+)/?$"
        replacement: "${1}/guacamole/"
        permanent: false

