http:
  middlewares:
    # ── Basic Auth: Monitoring Services (WUD, Portainer, Uptime Kuma, Dozzle) ────────
    monitoring-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: AI Services (Whisper, LocalAI, Ollama) ───────────────────
    ai-services-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: Internal Tools (IT-Tools, Excalidraw, Glance ext, Guacamole)
    it-tools-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Basic Auth: SearXNG ──────────────────────────────────────────────────
    searxng-auth:
      basicAuth:
        usersFile: /config/traefik/auth/htpasswd-admin

    # ── Docmost fix: strip Transfer-Encoding header forwarded by Traefik ───────
    # Root cause: Traefik converts HTTP/2 (from Cloudflare tunnel) to HTTP/1.1
    # and adds "Transfer-Encoding: chunked" for empty-body POST requests (e.g.
    # POST /api/users/me). Fastify sees TE=chunked → expects a body → finds no
    # Content-Type → returns 415. Removing the header lets Fastify treat the
    # request as body-less, so guards (JWT, workspace) run normally.
    # Applied globally to all Docmost routes (docmost-external, docmost-lab).
    docmost-strip-te:
      headers:
        customRequestHeaders:
          Transfer-Encoding: ""

    # ── Redirect: Guacamole requires /guacamole/ path ────────────────────────
    guacamole-redirect:
      redirectRegex:
        regex: "^(https?://[^/]+)/?$"
        replacement: "${1}/guacamole/"
        permanent: false

